name: romeu_lanches_admin
description: "Administração do ecossistema de vendas do Romeu Lanches."
publish_to: "none" 

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive_flutter: ^1.1.0
  google_fonts: ^8.1.0
  signals_flutter: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/


flutter_launcher_icons:
  image_path: "assets/images/burguer.webp"
  windows:
    generate: true
    image_path: "assets/images/burguer.webp"
    icon_size: 48
